<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>claude-history-viewer</title>
    <script>
      (function () {
        if (localStorage.getItem('claude-history-viewer-theme-user') === '1') {
          var theme = localStorage.getItem('claude-history-viewer-theme');
          if (theme === 'light' || theme === 'dark' || theme === 'eye') {
            document.documentElement.classList.remove('dark', 'light', 'eye');
            document.documentElement.classList.add(theme);
            document.documentElement.dataset.theme = theme;
            document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
          }
        }
        if (localStorage.getItem('claude-history-viewer-locale-user') === '1') {
          var locale = localStorage.getItem('claude-history-viewer-locale');
          if (locale === 'zh' || locale === 'en') {
            document.documentElement.lang = locale === 'zh' ? 'zh-CN' : 'en';
            document.documentElement.dataset.locale = locale;
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
